<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darago - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container-full">
        
        <div class="branding-panel">
            <img src="Logo Burung Dara.png" alt="Logo Burung Dara" class="img-logo-kecil">

            <div class="middle-content">
                <img src="logo with text.png" alt="Logo Darago Utuh" class="img-logo-utama">
            </div>
        </div>

        <div class="form-panel">
            <div class="form-box">
                <h2>Masuk</h2>
                <form action="#">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Masukkan email kamu" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Kata sandi</label>
                        <input type="password" id="password" placeholder="Masukkan kata sandi" required>
                    </div>
                    <button type="submit" class="btn-utama">MASUK</button>
                </form>
                <div class="buat-akun-link">
                    <p>Belum punya akun? <a href="#" id="open-modal">Buat Akun</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="register-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2>Buat Akun</h2>
            <form action="#">
                <div class="input-group">
                    <label for="reg-nama">Nama</label>
                    <input type="text" id="reg-nama" placeholder="Nama lengkap" required>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="Alamat email" required>
                </div>
                <div class="input-group">
                    <label>TTL (Tanggal Lahir)</label>
                    <div class="ttl-inputs">
                        <input type="number" placeholder="DD" min="1" max="31" required>
                        <input type="number" placeholder="MM" min="1" max="12" required>
                        <input type="number" placeholder="YYYY" min="1900" max="2026" required>
                    </div>
                </div>
                <button type="submit" class="btn-utama" style="margin-top: 15px;">DAFTAR</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
